---
name: Release Op-Kits Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'charts/op-kits/**'
      - '!charts/rasa/**'
      - '!charts/studio/**'

jobs:
  release:
    name: Release Op-Kits Helm Chart
    runs-on: ubuntu-24.04
    outputs:
      op-kits-version: ${{ steps.chart-info.outputs.version }}

    permissions:
      contents: write
      id-token: write
      pull-requests: read
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Read Helm Chart
        id: chart-info
        uses: miraai/read-helm-chart-yaml@9a798908719da8d062b86097d4ff1ad85abfc7aa
        with:
          path: charts/op-kits/

      - name: Release Helm chart
        id: release
        uses: ./.github/actions/release-helm-charts-oci
        with:
          gcp-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_OIDC_HELM }}
          gcp-service-account: '${{ secrets.SERVICE_ACCOUNT_OIDC_HELM }}'
          github-repo: '${{ github.repository }}'
          github-ref: '${{ github.ref }}'
          chart-path: 'charts/op-kits'

      - name: Notify Slack of successful release 💬
        if: steps.release.outcome == 'success'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "C0351QXJ5CP"
            text: "🚀 New *Op-Kits* Helm Chart version `${{ steps.chart-info.outputs.name }}-${{ steps.chart-info.outputs.version }}` has been released!"

      - name: Notify Slack of unsuccessful release ⛔️
        if: steps.release.outcome == 'failure'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "C0351QXJ5CP"
            text: "⛔️ *Op-Kits* Helm Chart version `${{ steps.chart-info.outputs.name }}-${{ steps.chart-info.outputs.version }}` could not be released 😱! Please check out <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Github Action workflow log>"
