{{- if and .Values.keycloak.enabled .Values.keycloak.ingress.enabled -}}
{{- $fullName := include "studio.fullname" . -}}
{{- $svcPort := .Values.keycloak.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-keycloak
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    {{- if .Values.keycloak.ingress.labels }}
{{ toYaml .Values.keycloak.ingress.labels | indent 4 }}
    {{- end }}
  {{- include "keycloak.ingress.annotations" . | nindent 2 }}
spec:
  {{- $className := .Values.keycloak.ingress.className | default .Values.config.ingressClassName }}
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if .Values.keycloak.ingress.tls }}
  tls:
    {{- range .Values.keycloak.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.keycloak.ingress.hostName | default $.Values.config.ingressHost | quote }}
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-keycloak
                port:
                  number: {{ $svcPort }}
{{- end }}
