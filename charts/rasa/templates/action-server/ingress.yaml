{{- if .Values.actionServer.ingress.enabled -}}
{{- $fullName := include "rasa.fullname" . -}}
{{- $svcPort := .Values.actionServer.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-action-server
  labels:
    {{- include "rasa.labels" . | nindent 4 }}
    {{- if .Values.actionServer.ingress.labels }}
{{ toYaml .Values.actionServer.ingress.labels | indent 4 }}
    {{- end }}
  {{- with .Values.actionServer.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.actionServer.ingress.className }}
  ingressClassName: {{ .Values.actionServer.ingress.className }}
  {{- end }}
  {{- if .Values.actionServer.ingress.tls }}
  tls:
    {{- range .Values.actionServer.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.actionServer.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if .pathType }}
            pathType: {{ .pathType }}
            {{- end }}
            backend:
              service:
                name: {{ $fullName }}-action-server
                port:
                  number: {{ $svcPort }}
          {{- end }}
          {{- if .extraPaths }}
          {{- range .extraPaths }}
          - path: {{ .path }}
            {{- if .pathType }}
            pathType: {{ .pathType }}
            {{- end }}
            backend:
              service:
                name: {{ .serviceName }}
                port:
                  number: {{ .servicePort }}
          {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
