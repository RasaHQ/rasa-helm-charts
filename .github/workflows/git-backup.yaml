name: Backup Rasa helm charts repo to S3
on:
  schedule:
    # Run cron job at 7AM Monday to Sunday.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  backup:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
    
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.GIT_BACKUP_ROLE_ARN }}
          aws-region: eu-central-1
    
      # Determine the date in the right format for us to tag the image.
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Create Git bundle
        run: git bundle create --progress rasa-helm-charts-${{ steps.date.outputs.date }}.bundle --all

      - name: Verify Git bundle
        run: git bundle verify rasa-helm-charts-${{ steps.date.outputs.date }}.bundle

      - name: Upload bundle to S3
        run: aws s3 cp rasa-helm-charts-${{ steps.date.outputs.date }}.bundle s3://github-backups-dr/rasa-helm-charts/
