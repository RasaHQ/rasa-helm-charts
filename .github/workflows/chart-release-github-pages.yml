name: Release Helm Charts to GitHub Pages (PR flow)

on:
  push:
    branches: [ main ]
    paths:
      - charts/**
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

env:
  PAGES_BRANCH: ci/helm-index
  INDEX_PATH: charts/index.yaml

jobs:
  release-charts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.CHART_RELEASER_PAT }}

      - name: Configure git identity
        run: |
          git config user.name "chart-bot"
          git config user.email "chart-bot@users.noreply.github.com"

      # Ensure ci/helm-index exists AND has charts/ so CR_PAGES_INDEX_PATH can be written
      - name: Ensure ${PAGES_BRANCH} branch exists with charts/
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "${PAGES_BRANCH}" >/dev/null 2>&1; then
            echo "${PAGES_BRANCH} already exists."
            git fetch origin "${PAGES_BRANCH}:${PAGES_BRANCH}"
            git checkout "${PAGES_BRANCH}"
            mkdir -p charts
            if ! git ls-files --error-unmatch charts >/dev/null 2>&1; then
              touch charts/.keep
              git add charts/.keep
              git commit -m "chore: ensure charts/ exists for index path"
              git push origin "${PAGES_BRANCH}"
            fi
            git checkout -f -
          else
            echo "Creating ${PAGES_BRANCH}…"
            git checkout --orphan "${PAGES_BRANCH}"
            git reset --hard
            mkdir -p charts
            echo "# Helm index branch" > README.md
            touch charts/.keep
            git add README.md charts/.keep
            git commit -m "chore: init ${PAGES_BRANCH} (add charts/ for index)"
            git push origin "${PAGES_BRANCH}"
            git checkout -f main
          fi

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.15.2

      # Resolve the most recent tag per chart to scope the changelog range
      - name: Get previous chart tags
        id: prev-tags
        run: |
          echo "studio=$(git tag --sort=-version:refname | grep '^studio-' | head -1 || true)" >> $GITHUB_OUTPUT
          echo "rasa=$(git tag --sort=-version:refname | grep '^rasa-' | head -1 || true)" >> $GITHUB_OUTPUT
          echo "op_kits=$(git tag --sort=-version:refname | grep '^op-kits-' | head -1 || true)" >> $GITHUB_OUTPUT

      - name: Generate Studio release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --include-path "charts/studio/**" ${{ steps.prev-tags.outputs.studio != '' && format('{0}..HEAD', steps.prev-tags.outputs.studio) || '' }}
        env:
          OUTPUT: charts/studio/RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate Rasa Pro release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --include-path "charts/rasa/**" ${{ steps.prev-tags.outputs.rasa != '' && format('{0}..HEAD', steps.prev-tags.outputs.rasa) || '' }}
        env:
          OUTPUT: charts/rasa/RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate op-kits release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --include-path "charts/op-kits/**" ${{ steps.prev-tags.outputs.op_kits != '' && format('{0}..HEAD', steps.prev-tags.outputs.op_kits) || '' }}
        env:
          OUTPUT: charts/op-kits/RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      # Write cr config so chart-releaser picks up the generated RELEASE_NOTES.md per chart
      - name: Write chart-releaser config
        run: |
          echo 'release-notes-file: RELEASE_NOTES.md' > .cr.yaml

      # Package charts, upload to Releases, and write charts/index.yaml to ci/helm-index
      - name: Run chart-releaser (packages + index → ${PAGES_BRANCH})
        uses: helm/chart-releaser-action@a0d2dc62c5e491af8ef6ba64a2e02bcf3fb33aa1 # v1.7.0
        with:
          charts_dir: charts
          config: .cr.yaml
        env:
          CR_TOKEN: ${{ secrets.CHART_RELEASER_PAT }}
          CR_PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
          CR_PAGES_INDEX_PATH: ${{ env.INDEX_PATH }}
          CR_SKIP_EXISTING: "true"

      # Fetch the updated index.yaml from ci/helm-index
      - name: Fetch updated index.yaml from ${PAGES_BRANCH}
        id: fetch_index
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "${PAGES_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${PAGES_BRANCH}:${PAGES_BRANCH}"
            git checkout "${PAGES_BRANCH}" -- "${INDEX_PATH}"
          else
            echo "no_index=true" >> $GITHUB_OUTPUT
          fi

      # Open/update a PR into main with only charts/index.yaml
      - name: Create PR for index.yaml
        if: steps.fetch_index.outputs.no_index != 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.CHART_RELEASER_PAT }}
          commit-message: "chore(helm): update ${INDEX_PATH}"
          title: "chore(helm): update Helm index"
          branch: ci/update-helm-index
          base: main
          delete-branch: true
          labels: |
            automated
          body: |
            ## 📦 Helm Repository Index Update

            This PR updates the Helm repository index with newly released charts.
            Packages are stored as GitHub Release assets. Once merged, Pages will serve the updated index.

            Once merged, https://helm.rasa.com/charts will serve the updated index.

          add-paths: |
            charts/index.yaml
